<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!-- NAVBAR CSS -->
  <link rel="stylesheet" href="navbar.css" />
  <link rel="stylesheet" href="expense-tracker.css">
</head>
<body>
<!-- NAVBAR LOAD -->
  <div id="navbar"></div>
<div class="page">

  <h2 class="title">Expense Tracker</h2>

  <!-- Input Row -->
  <div class="input-row">
   <select id="category">
  <option value="">Select Category</option>
  <option value="Food">🍔 Food</option>
  <option value="Travel">🚕 Travel</option>
  <option value="Shopping">🛒 Shopping</option>
  <option value="Bills">💡 Bills</option>
  <option value="Entertainment">🎬 Entertainment</option>
  <option value="Other">📦 Other</option>
</select>

    <input type="number" placeholder="Amount">
    <input type="date">
  </div>

  <!-- Button -->
  <button class="add-btn">ADD EXPENSE</button>

  <!-- Expense List -->
  <div class="expense-list">
    <div class="expense-item">Item 0</div>
    <div class="expense-item">Item 1</div>
    <div class="expense-item">Item 2</div>
    <div class="expense-item">Item 3</div>
    <div class="expense-item">Item 4</div>
    <div class="expense-item">Item 5</div>
    <div class="expense-item">Item 6</div>
    <div class="expense-item">Item 7</div>
    <div class="expense-item">Item 8</div>
  </div>

</div>
<script>
  fetch("navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;

      const script = document.createElement("script");
      script.src = "navbar.js";
    script.type = "module"; 
      script.onload = () => {
        if (typeof initNavbar === "function") {
          initNavbar(); // ⭐ VERY IMPORTANT
        }
      };

      document.body.appendChild(script);
    });
</script>

</body>
</html>
