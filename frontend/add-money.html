<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Money | DigitalPay</title>
  <!-- NAVBAR CSS -->
  <link rel="stylesheet" href="navbar.css" />
  <link rel="stylesheet" href="add-money.css" />
</head>
<body>
 <!-- NAVBAR LOAD -->
  <div id="navbar"></div>

  <!-- HEADER -->
  <header class="top">
    <h1>Add Money</h1>
    <p>Fast • Secure • Reliable Payments</p>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- WALLET CARD -->
    <div class="wallet-card">

      <div class="user-section">
        <p class="username">Welcome, <strong id="userName">User Name</strong></p>
        <h2 class="balance" id="walletBalance">₹ 0</h2>
        <span class="small">Available Wallet Balance</span>
      </div>

      <!-- QUICK AMOUNT -->
      <div class="quick-add">
        <button onclick="setAmount(100)">₹100</button>
        <button onclick="setAmount(500)">₹500</button>
        <button onclick="setAmount(1000)">₹1000</button>
        <button onclick="setAmount(2000)">₹2000</button>
      </div>

      <!-- FORM -->
      <div class="form">
        <label>Enter Amount</label>
        <input type="number" id="amountInput" placeholder="Enter amount (₹)" />
        <button class="add-btn" id="addMoneyBtn">Add Money</button>
      </div>

      <!-- INFO -->
      <div class="info">
        <p>✔ Instant wallet credit</p>
        <p>✔ 100% secure payments</p>
        <p>✔ UPI • Card • Net Banking</p>
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2025 DigitalAddWorld Tech</p>
    <p>Powered by DigitalPay Wallet</p>
  </footer>

  <script>
    fetch("navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;

        const script = document.createElement("script");
        script.src = "navbar.js";
    script.type = "module"; 
        script.onload = () => {
          if (typeof initNavbar === "function") {
            initNavbar();
          }
        };

        document.body.appendChild(script);
      });

    function setAmount(value) {
      document.getElementById('amountInput').value = value;
    }
  </script>

  <script type="module" src="add-money.js"></script>
</body>
</html>
